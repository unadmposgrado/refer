<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Registro - Referencias IA</title>
  <link rel="icon" href="img/cita.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="siteHeader"></div>

  <main class="container">
    <section class="form-section">
      <h2>Crear cuenta</h2>
      <form id="registerForm" class="form" novalidate>
        <!-- orden solicitado -->
        <div class="form-row">
          <label for="fullName">Nombre completo <span class="required">*</span></label>
          <input type="text" id="fullName" name="fullName" required placeholder="Tu nombre completo">
        </div>
        <div class="form-row">
          <label for="program">Programa educativo <span class="required">*</span></label>
          <input type="text" id="program" name="program" required placeholder="Ej. Licenciatura en...">
        </div>
        <div class="form-row">
          <label for="matricula">Matrícula</label>
          <input type="text" id="matricula" name="matricula" placeholder="Tu matrícula UnADM">
        </div>
        <div class="form-row">
          <label for="email">Correo electrónico <span class="required">*</span></label>
          <input type="email" id="email" name="email" required placeholder="Ej. correo@nube.unadmexico.mx">
        </div>
        <div class="form-row">
          <label for="password">Contraseña <span class="required">*</span></label>
          <input type="password" id="password" name="password" required>
        </div>
        <div class="form-row">
          <label for="confirmPassword">Confirmar contraseña <span class="required">*</span></label>
          <input type="password" id="confirmPassword" name="confirmPassword" required>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Registrarme</button>
        </div>
      </form>
      <p class="muted">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión aquí</a>.
      </p>
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>2026, Posgrado UnADM</small>
    </div>
  </footer>

  <script type="module" src="js/header.js"></script>
  <script type="module" src="js/registro.js"></script>
</body>
</html>
