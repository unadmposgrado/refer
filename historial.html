<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Historial - Referencias IA</title>
  <link rel="icon" href="img/cita.png" type="image/png">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="siteHeader"></div>

  <main id="dashboard" class="dashboard-container">
    <section id="historial-section">
      <h2>Mi historial</h2>
      <p id="user-name" class="user-name"></p>
      <p>Estas son tus referencias anteriores:</p>
      <!-- dashboard métricas para el usuario -->
      <div id="user-dashboard"></div>
      <div id="historial-list"></div>
    </section>

    <section id="metrics-section" hidden>
      <!-- contenido de métricas se inyecta desde js/metrics.js -->
    </section>
  </main>

  <footer class="site-footer">
    <div class="container">
      <small>2026, Posgrado UnADM</small>
    </div>
  </footer>

  <script type="module" src="js/header.js"></script>
  <script type="module" src="js/app.js"></script>
  <script type="module" src="js/dashboard.js"></script>
  <script type="module" src="js/historial.js"></script>
  <script type="module" src="js/metrics.js"></script>
</body>
</html>
